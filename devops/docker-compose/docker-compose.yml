version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openemr
    networks:
      - openemr-net

  openemr:
    image: openemr/openemr
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    expose:
      - "80"
    depends_on:
      - db
    volumes:
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
    networks:
      - openemr-net

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openemr
      MYSQL_USER: openemr
      MYSQL_PASSWORD: openemr
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - openemr-net

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - openemr-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - openemr-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8081:8080"
    networks:
      - openemr-net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

volumes:
  db_data:
  openemr_sites:

networks:
  openemr-net:
    driver: bridge